<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="table">
<style>
    .tab-bar {
        display:flex; gap:4px; margin-bottom:20px;
        background:#fff; border-radius:12px; padding:6px;
        box-shadow:0 0 2rem 0 rgba(136,152,170,.15); width:fit-content;
    }
    .tab-btn {
        padding:9px 22px; border:none; border-radius:8px;
        font-size:13px; font-weight:700; font-family:inherit;
        cursor:pointer; color:#8898aa; background:transparent;
        transition:all .2s; display:flex; align-items:center; gap:7px;
    }
    .tab-btn:hover { color:#32325d; background:#f6f9fc; }
    .tab-btn.active { background:#5e72e4; color:#fff; box-shadow:0 4px 12px rgba(94,114,228,.35); }
    .tab-count {
        border-radius:10px; padding:1px 7px; font-size:11px; line-height:1.6;
    }
    .tab-btn.active .tab-count { background:rgba(255,255,255,.25); color:#fff; }
    .tab-btn:not(.active) .tab-count { background:rgba(0,0,0,.07); color:#525f7f; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* shared */
    .card { background:#fff; border-radius:12px; box-shadow:0 0 2rem 0 rgba(136,152,170,.15); overflow:hidden; }
    .card-header { padding:16px 24px; border-bottom:1px solid #edf2f9; display:flex; align-items:center; justify-content:space-between; }
    .card-header h3 { font-size:15px; font-weight:700; color:#32325d; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
    .toolbar-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .search-wrap { position:relative; }
    .search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#adb5bd; font-size:13px; }
    .search-input { padding:9px 14px 9px 36px; border:1px solid #dee2e6; border-radius:8px; font-size:13px; font-family:inherit; color:#32325d; width:230px; outline:none; transition:all .2s; }
    .search-input:focus { border-color:#5e72e4; box-shadow:0 0 0 3px rgba(94,114,228,.12); }
    .filter-select { padding:9px 12px; border:1px solid #dee2e6; border-radius:8px; font-size:13px; font-family:inherit; color:#525f7f; background:#fff; outline:none; cursor:pointer; }
    .filter-select:focus { border-color:#5e72e4; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; border:none; transition:all .2s; }
    .btn-primary { background:#5e72e4; color:#fff; }
    .btn-primary:hover { background:#4a5fd4; transform:translateY(-1px); box-shadow:0 4px 12px rgba(94,114,228,.35); }
    .btn-danger { background:#f5365c; color:#fff; }
    .btn-danger:hover { background:#d4213f; }
    .btn-warning { background:#fb6340; color:#fff; }
    .btn-warning:hover { background:#e5502d; }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-icon { padding:6px 10px; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:12px 16px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#8898aa; background:#f6f9fc; text-align:left; white-space:nowrap; user-select:none; }
    thead th.sortable { cursor:pointer; }
    thead th.sortable:hover { color:#5e72e4; }
    .sort-icon { margin-left:4px; font-size:10px; }
    tbody td { padding:13px 16px; font-size:13px; color:#525f7f; border-bottom:1px solid #edf2f9; vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover:not(.editing) { background:#f8f9fe; }
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-active   { background:#d4f5e9; color:#1a9e6a; }
    .badge-inactive { background:#fde8ed; color:#c0203d; }
    .badge-draft    { background:#eef0fd; color:#4a5fd4; }
    .badge-star     { background:#fff8e1; color:#c79000; }
    input[type="checkbox"] { width:16px; height:16px; accent-color:#5e72e4; cursor:pointer; }
    .bulk-bar { display:none; align-items:center; gap:12px; padding:10px 16px; background:#eef0fd; border-radius:8px; margin-bottom:12px; font-size:13px; color:#32325d; font-weight:600; }
    .bulk-bar.show { display:flex; }
    .pagination-wrap { padding:16px 24px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid #edf2f9; flex-wrap:wrap; gap:12px; }
    .pagination-info { font-size:13px; color:#8898aa; }
    .pagination { display:flex; gap:4px; list-style:none; }
    .page-btn { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid #dee2e6; background:#fff; color:#525f7f; transition:all .2s; }
    .page-btn:hover { border-color:#5e72e4; color:#5e72e4; }
    .page-btn.active { background:#5e72e4; border-color:#5e72e4; color:#fff; }
    .page-btn:disabled { opacity:.4; cursor:not-allowed; }
    .empty-state { text-align:center; padding:50px 20px; color:#adb5bd; }
    .empty-state i { font-size:36px; margin-bottom:12px; display:block; }
    .table-loading { text-align:center; padding:40px; color:#8898aa; font-size:13px; }
    .product-thumb { width:42px; height:42px; border-radius:8px; object-fit:cover; border:1px solid #edf2f9; }
    .thumb-placeholder { width:42px; height:42px; border-radius:8px; background:#f6f9fc; border:1px solid #edf2f9; display:flex; align-items:center; justify-content:center; color:#adb5bd; font-size:16px; }
    .product-name { font-weight:600; color:#32325d; }
    .product-slug { font-size:11px; color:#adb5bd; margin-top:2px; }
    .action-btns { display:flex; gap:5px; }

    /* category inline edit */
    .cat-view { display:flex; align-items:center; }
    .cat-edit { display:none; }
    tr.editing .cat-view { display:none; }
    tr.editing .cat-edit { display:flex; align-items:center; }
    tr.editing { background:#fffbf0 !important; }
    .inline-input { padding:6px 10px; border:1px solid #dee2e6; border-radius:6px; font-size:12px; font-family:inherit; color:#32325d; outline:none; width:100%; min-width:90px; transition:border .2s; background:#fff; }
    .inline-input:focus { border-color:#5e72e4; }
    .inline-select { padding:6px 10px; border:1px solid #dee2e6; border-radius:6px; font-size:12px; font-family:inherit; color:#32325d; background:#fff; outline:none; cursor:pointer; }
    .inline-select:focus { border-color:#5e72e4; }
    .save-btn   { background:none; border:none; color:#2dce89; font-size:17px; cursor:pointer; padding:3px 5px; border-radius:5px; transition:background .15s; }
    .save-btn:hover   { background:#d4f5e9; }
    .cancel-btn { background:none; border:none; color:#f5365c; font-size:17px; cursor:pointer; padding:3px 5px; border-radius:5px; transition:background .15s; }
    .cancel-btn:hover { background:#fde8ed; }
    .edit-row-btn { background:none; border:none; color:#fb6340; font-size:13px; cursor:pointer; padding:5px 7px; border-radius:6px; transition:background .15s; }
    .edit-row-btn:hover { background:#fff3ee; }
    .del-row-btn  { background:none; border:none; color:#f5365c; font-size:13px; cursor:pointer; padding:5px 7px; border-radius:6px; transition:background .15s; }
    .del-row-btn:hover  { background:#fde8ed; }
    .new-row { background:#f0fff8 !important; }
</style>

<!-- TAB BAR -->
<div class="tab-bar">
    <button class="tab-btn active" id="tab-product" onclick="switchTab('product')">
        <i class="fa-solid fa-box"></i> Sản phẩm
        <span class="tab-count" id="tc-product"></span>
    </button>
    <button class="tab-btn" id="tab-category" onclick="switchTab('category')">
        <i class="fa-solid fa-list"></i> Danh mục
        <span class="tab-count" id="tc-category"></span>
    </button>
</div>

<!-- ══ TAB PRODUCT ══ -->
<div class="tab-panel active" id="panel-product">
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="p-search" class="search-input" placeholder="Tìm tên, slug...">
            </div>
            <select id="p-filterStatus" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Đang bán</option>
                <option value="INACTIVE">Ngừng bán</option>
                <option value="DRAFT">Nháp</option>
            </select>
            <select id="p-filterCat" class="filter-select">
                <option value="">Tất cả danh mục</option>
            </select>
            <select id="p-filterBest" class="filter-select">
                <option value="">Tất cả</option>
                <option value="true">Bestseller</option>
                <option value="false">Thường</option>
            </select>
        </div>
        <div>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i> Thêm sản phẩm
            </button>
        </div>
    </div>

    <div class="bulk-bar" id="p-bulkBar">
        <span id="p-bulkCount">0</span> sản phẩm được chọn
        <button class="btn btn-danger btn-sm" onclick="bulkDeleteProducts()">
            <i class="fa-solid fa-trash"></i> Xóa đã chọn
        </button>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>Danh sách sản phẩm</h3>
            <span id="p-totalCount" style="font-size:13px;color:#8898aa;"></span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;"><input type="checkbox" id="p-checkAll" onchange="toggleCheckAll(this)"></th>
                        <th style="width:56px;">Ảnh</th>
                        <th class="sortable" onclick="pSortBy('name')">Tên sản phẩm <span class="sort-icon" id="psort-name">⇅</span></th>
                        <th class="sortable" onclick="pSortBy('price')">Giá <span class="sort-icon" id="psort-price">⇅</span></th>
                        <th>Danh mục</th>
                        <th class="sortable" onclick="pSortBy('status')">Trạng thái <span class="sort-icon" id="psort-status">⇅</span></th>
                        <th>Best</th>
                        <th style="width:110px;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="p-tbody">
                    <tr><td colspan="8" class="table-loading"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-wrap">
            <div class="pagination-info" id="p-pageInfo"></div>
            <ul class="pagination" id="p-pagination"></ul>
        </div>
    </div>
</div>

<!-- ══ TAB CATEGORY ══ -->
<div class="tab-panel" id="panel-category">
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="c-search" class="search-input" placeholder="Tìm tên, slug...">
            </div>
            <select id="c-filterType" class="filter-select">
                <option value="">Tất cả loại</option>
                <option value="PRODUCT">Sản phẩm</option>
                <option value="POST">Bài viết</option>
                <option value="SERVICE">Dịch vụ</option>
            </select>
            <select id="c-filterStatus" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Hoạt động</option>
                <option value="INACTIVE">Ẩn</option>
                <option value="DRAFT">Nháp</option>
            </select>
        </div>
        <div>
            <button class="btn btn-primary" onclick="addCategoryRow()">
                <i class="fa-solid fa-plus"></i> Thêm danh mục
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>Danh sách danh mục</h3>
            <span id="c-totalCount" style="font-size:13px;color:#8898aa;"></span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="sortable" onclick="cSortBy('name')">Tên danh mục <span class="sort-icon" id="csort-name">⇅</span></th>
                        <th>Slug</th>
                        <th>Loại</th>
                        <th>Danh mục cha</th>
                        <th class="sortable" onclick="cSortBy('status')">Trạng thái <span class="sort-icon" id="csort-status">⇅</span></th>
                        <th style="width:100px;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="c-tbody">
                    <tr><td colspan="6" class="table-loading"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-wrap">
            <div class="pagination-info" id="c-pageInfo"></div>
            <ul class="pagination" id="c-pagination"></ul>
        </div>
    </div>
</div>
</div>
</body>
</html>
