<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="modal">
        <style>
            /* ── OVERLAY ── */
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                backdrop-filter: blur(2px);
                z-index: 999;
                align-items: center;
                justify-content: center;
            }

            .overlay.show {
                display: flex;
            }

            /* ── MODAL BOX ── */
            .modal-box {
                background: #fff;
                border-radius: 16px;
                width: 100%;
                max-width: 720px;
                max-height: 92vh;
                display: flex;
                flex-direction: column;
                box-shadow: 0 25px 60px rgba(0, 0, 0, .25);
                animation: slideUp .25s ease;
            }

            .modal-box.modal-sm {
                max-width: 420px;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(30px);
                    opacity: 0
                }

                to {
                    transform: translateY(0);
                    opacity: 1
                }
            }

            .modal-header {
                padding: 18px 24px;
                border-bottom: 1px solid #edf2f9;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }

            .modal-header h4 {
                font-size: 16px;
                font-weight: 700;
                color: #32325d;
            }

            .btn-close {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                border: none;
                background: #f6f9fc;
                color: #8898aa;
                font-size: 14px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all .2s;
            }

            .btn-close:hover {
                background: #fde8ed;
                color: #f5365c;
            }

            /* ── MODAL TABS ── */
            .modal-tabs {
                display: flex;
                gap: 2px;
                padding: 12px 24px 0;
                border-bottom: 1px solid #edf2f9;
                flex-shrink: 0;
            }

            .modal-tab-btn {
                padding: 8px 18px;
                border: none;
                background: transparent;
                font-size: 13px;
                font-weight: 600;
                font-family: inherit;
                color: #8898aa;
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
                transition: all .2s;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .modal-tab-btn:hover {
                color: #32325d;
            }

            .modal-tab-btn.active {
                color: #5e72e4;
                border-bottom-color: #5e72e4;
            }

            /* ── MODAL BODY ── */
            .modal-body {
                padding: 20px 24px;
                overflow-y: auto;
                flex: 1;
            }

            .modal-tab-panel {
                display: none;
            }

            .modal-tab-panel.active {
                display: block;
            }

            /* ── FORM ── */
            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-label {
                display: block;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: .8px;
                color: #525f7f;
                margin-bottom: 6px;
            }

            .form-label .req {
                color: #f5365c;
                margin-left: 2px;
            }

            .form-control {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                font-size: 13px;
                font-family: inherit;
                color: #32325d;
                outline: none;
                transition: all .2s;
                background: #fff;
            }

            .form-control:focus {
                border-color: #5e72e4;
                box-shadow: 0 0 0 3px rgba(94, 114, 228, .12);
            }

            textarea.form-control {
                resize: vertical;
                min-height: 80px;
            }

            .slug-wrap {
                position: relative;
            }

            .slug-wrap .form-control {
                padding-right: 36px;
            }

            .slug-refresh {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                color: #adb5bd;
                font-size: 13px;
                cursor: pointer;
                transition: color .2s;
            }

            .slug-refresh:hover {
                color: #5e72e4;
            }

            /* ── THUMBNAIL UPLOAD ── */
            .thumb-upload-area {
                border: 2px dashed #dee2e6;
                border-radius: 10px;
                padding: 20px;
                text-align: center;
                cursor: pointer;
                transition: all .2s;
                background: #fafbff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                color: #adb5bd;
                font-size: 13px;
                min-height: 110px;
                position: relative;
            }

            .thumb-upload-area:hover {
                border-color: #5e72e4;
                background: #f0f3ff;
                color: #5e72e4;
            }

            .thumb-upload-area.has-image {
                padding: 8px;
                border-style: solid;
                border-color: #dee2e6;
            }

            .thumb-upload-area input[type="file"] {
                display: none;
            }

            .thumb-upload-area i.upload-icon {
                font-size: 28px;
            }

            .thumb-preview-container {
                display: none;
                position: relative;
                width: 100%;
            }

            .thumb-preview-container.show {
                display: block;
            }

            .thumb-preview-img {
                width: 100%;
                max-height: 160px;
                object-fit: cover;
                border-radius: 8px;
                display: block;
            }

            .thumb-remove-btn {
                position: absolute;
                top: 6px;
                right: 6px;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                background: rgba(0, 0, 0, .55);
                border: none;
                color: #fff;
                font-size: 11px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background .2s;
            }

            .thumb-remove-btn:hover {
                background: rgba(245, 54, 92, .85);
            }

            .thumb-upload-hint {
                font-size: 11px;
                color: #adb5bd;
                margin-top: 4px;
            }

            .thumb-upload-hint.uploading {
                color: #fb6340;
                font-weight: 600;
            }

            .thumb-upload-hint.success {
                color: #2dce89;
                font-weight: 600;
            }

            .thumb-upload-hint.error {
                color: #f5365c;
                font-weight: 600;
            }

            /* ── CKEDITOR ── */
            .ck-wrap {
                border: 1px solid #dee2e6;
                border-radius: 8px;
                overflow: hidden;
                min-height: 380px;
            }

            .ck-wrap .ck-editor__editable {
                min-height: 320px;
            }

            .ck-wrap .ck.ck-toolbar {
                border: none;
                border-bottom: 1px solid #dee2e6;
            }

            .ck-wrap .ck.ck-editor__editable:not(.ck-focused) {
                border: none;
            }

            .ck-wrap .ck.ck-editor__editable.ck-focused {
                border: none;
                box-shadow: none;
            }

            .ck-upload-status {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: #fff8e1;
                border: 1px solid #ffe082;
                border-radius: 8px;
                margin-bottom: 12px;
                font-size: 12px;
                font-weight: 600;
                color: #c76a00;
            }

            .ck-upload-status.show {
                display: flex;
            }

            .ck-upload-status i {
                animation: spin .8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }

            /* ── MODAL FOOTER ── */
            .modal-footer {
                padding: 14px 24px;
                border-top: 1px solid #edf2f9;
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                flex-shrink: 0;
            }

            .m-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 9px 18px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                font-family: inherit;
                cursor: pointer;
                border: none;
                transition: all .2s;
            }

            .m-btn-primary {
                background: #5e72e4;
                color: #fff;
            }

            .m-btn-primary:hover:not(:disabled) {
                background: #4a5fd4;
            }

            .m-btn-primary:disabled {
                opacity: .55;
                cursor: not-allowed;
            }

            .m-btn-secondary {
                background: #f6f9fc;
                color: #525f7f;
                border: 1px solid #dee2e6;
            }

            .m-btn-secondary:hover {
                background: #edf2f9;
            }

            .m-btn-danger {
                background: #f5365c;
                color: #fff;
            }

            .m-btn-danger:hover {
                background: #d4213f;
            }

            /* ── DELETE MODAL ── */
            .delete-icon {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: #fde8ed;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #f5365c;
                font-size: 24px;
                margin: 0 auto 16px;
            }

            .delete-confirm-text {
                text-align: center;
                color: #525f7f;
                font-size: 14px;
                line-height: 1.6;
            }

            /* ── TOAST ── */
            .toast-container {
                position: fixed;
                bottom: 24px;
                right: 24px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                z-index: 9999;
            }

            .toast {
                padding: 12px 18px;
                border-radius: 10px;
                font-size: 13px;
                font-weight: 600;
                color: #fff;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, .15);
                animation: toastIn .3s ease;
                min-width: 240px;
            }

            @keyframes toastIn {
                from {
                    transform: translateX(60px);
                    opacity: 0
                }

                to {
                    transform: translateX(0);
                    opacity: 1
                }
            }

            .toast-success {
                background: #2dce89;
            }

            .toast-error {
                background: #f5365c;
            }

            .toast-warning {
                background: #fb6340;
            }

            /* ════════════════════════════════════════
       CSS CHO CONTENT RENDER TỪ CKEDITOR
       Dùng cho: th:utext="${product.content}"
    ════════════════════════════════════════ */
            .ck-content,
            .tab-pane .ck-content,
            #nav-about .ck-content,
            /* fallback: áp thẳng lên container chứa th:utext */
            #nav-about>div,
            .product-content {
                font-size: 15px;
                line-height: 1.8;
                color: #32325d;
                word-break: break-word;
            }

            /* Ảnh trong content — responsive */
            .ck-content img,
            #nav-about>div img,
            .product-content img {
                max-width: 100%;
                height: auto;
                border-radius: 8px;
                display: block;
                margin: 12px auto;
                box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
            }

            /* Figure (CKEditor wrap ảnh trong figure) */
            .ck-content figure,
            #nav-about>div figure,
            .product-content figure {
                margin: 16px 0;
                text-align: center;
            }

            .ck-content figure img,
            #nav-about>div figure img,
            .product-content figure img {
                margin: 0 auto;
            }

            .ck-content figcaption,
            #nav-about>div figcaption,
            .product-content figcaption {
                font-size: 12px;
                color: #8898aa;
                margin-top: 6px;
                font-style: italic;
            }

            /* Table — responsive */
            .ck-content .table,
            #nav-about>div .table,
            .product-content .table {
                overflow-x: auto;
                display: block;
                margin: 20px 0;
                border-radius: 8px;
                box-shadow: 0 0 0 1px #edf2f9;
            }

            .ck-content table,
            #nav-about>div table,
            .product-content table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
                min-width: 400px;
            }

            .ck-content table th,
            #nav-about>div table th,
            .product-content table th {
                background: #f6f9fc;
                padding: 10px 14px;
                font-weight: 700;
                color: #32325d;
                text-align: left;
                border: 1px solid #edf2f9;
                white-space: nowrap;
            }

            .ck-content table td,
            #nav-about>div table td,
            .product-content table td {
                padding: 10px 14px;
                border: 1px solid #edf2f9;
                color: #525f7f;
                vertical-align: top;
            }

            .ck-content table tr:nth-child(even) td,
            #nav-about>div table tr:nth-child(even) td,
            .product-content table tr:nth-child(even) td {
                background: #f8f9fe;
            }

            /* Headings */
            .ck-content h2,
            #nav-about>div h2,
            .product-content h2 {
                font-size: 22px;
                font-weight: 700;
                color: #32325d;
                margin: 24px 0 12px;
            }

            .ck-content h3,
            #nav-about>div h3,
            .product-content h3 {
                font-size: 18px;
                font-weight: 700;
                color: #32325d;
                margin: 20px 0 10px;
            }

            .ck-content h4,
            #nav-about>div h4,
            .product-content h4 {
                font-size: 16px;
                font-weight: 600;
                color: #32325d;
                margin: 16px 0 8px;
            }

            /* Paragraph & list */
            .ck-content p,
            #nav-about>div p,
            .product-content p {
                margin: 0 0 12px;
            }

            .ck-content ul,
            .ck-content ol,
            #nav-about>div ul,
            #nav-about>div ol,
            .product-content ul,
            .product-content ol {
                padding-left: 24px;
                margin: 0 0 12px;
            }

            .ck-content li,
            #nav-about>div li,
            .product-content li {
                margin-bottom: 4px;
            }

            /* Blockquote */
            .ck-content blockquote,
            #nav-about>div blockquote,
            .product-content blockquote {
                border-left: 4px solid #5e72e4;
                padding: 10px 16px;
                margin: 16px 0;
                background: #f0f3ff;
                border-radius: 0 8px 8px 0;
                color: #525f7f;
                font-style: italic;
            }

            /* Code */
            .ck-content pre,
            #nav-about>div pre,
            .product-content pre {
                background: #f6f9fc;
                border-radius: 8px;
                padding: 14px 16px;
                overflow-x: auto;
                font-size: 13px;
                color: #32325d;
                border: 1px solid #edf2f9;
                margin: 12px 0;
            }

            .ck-content code,
            #nav-about>div code,
            .product-content code {
                background: #eef0fd;
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 12px;
                color: #5e72e4;
            }
        </style>

        <!-- ══════════════════════════════════════
     MODAL THÊM / SỬA SẢN PHẨM
══════════════════════════════════════ -->
        <div class="overlay" id="productOverlay" onclick="closeOnOverlay(event,'productOverlay')">
            <div class="modal-box">
                <div class="modal-header">
                    <h4 id="modalTitle">Thêm sản phẩm mới</h4>
                    <button class="btn-close" onclick="closeProductModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="modal-tabs">
                    <button class="modal-tab-btn active" id="mtab-info" onclick="switchModalTab('info',this)">
                        <i class="fa-solid fa-circle-info"></i> Thông tin
                    </button>
                    <button class="modal-tab-btn" id="mtab-content" onclick="switchModalTab('content',this)">
                        <i class="fa-solid fa-align-left"></i> Nội dung
                    </button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="productId">

                    <!-- ── TAB THÔNG TIN ── -->
                    <div class="modal-tab-panel active" id="modalTabInfo">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Tên sản phẩm <span class="req">*</span></label>
                                <input type="text" id="productName" class="form-control" placeholder="Nhập tên sản phẩm"
                                    oninput="autoSlug(this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Slug <span class="req">*</span></label>
                                <div class="slug-wrap">
                                    <input type="text" id="productSlug" class="form-control" placeholder="tu-dong-tao">
                                    <i class="fa-solid fa-rotate-right slug-refresh"
                                        onclick="autoSlug(document.getElementById('productName').value,true)"
                                        title="Tạo lại slug"></i>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Giá <span class="req">*</span></label>
                                <input type="number" id="productPrice" class="form-control" placeholder="0" min="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Danh mục <span class="req">*</span></label>
                                <select id="productCategory" class="form-control">
                                    <option value="">-- Chọn danh mục --</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Trạng thái</label>
                                <select id="productStatus" class="form-control">
                                    <option value="ACTIVE">Đang bán</option>
                                    <option value="INACTIVE">Ngừng bán</option>
                                    <option value="DRAFT">Nháp</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Bestseller</label>
                                <select id="productBest" class="form-control">
                                    <option value="false">Không</option>
                                    <option value="true">Có</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Mô tả ngắn</label>
                            <textarea id="productDesc" class="form-control" placeholder="Mô tả ngắn..."></textarea>
                        </div>

                        <!-- THUMBNAIL UPLOAD -->
                        <div class="form-group">
                            <label class="form-label">Thumbnail</label>
                            <input type="hidden" id="productThumb">

                            <!-- Preview khi đã có ảnh -->
                            <div class="thumb-preview-container" id="thumbPreviewContainer">
                                <img class="thumb-preview-img" id="thumbPreviewImg" src="" alt="thumbnail">
                                <button class="thumb-remove-btn" type="button" onclick="removeThumbnail()"
                                    title="Xóa ảnh">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>

                            <!-- Vùng upload (ẩn khi đã có ảnh) -->
                            <div class="thumb-upload-area" id="thumbUploadArea"
                                onclick="document.getElementById('thumbFileInput').click()">
                                <input type="file" id="thumbFileInput" accept="image/*"
                                    onchange="uploadThumbnail(this)">
                                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                                <span>Kéo thả hoặc click để chọn ảnh</span>
                                <span style="font-size:11px;">PNG, JPG, WEBP — tối đa 5MB</span>
                            </div>
                            <div class="thumb-upload-hint" id="thumbUploadHint"></div>
                        </div>
                    </div>

                    <!-- ── TAB NỘI DUNG (CKEDITOR) ── -->
                    <div class="modal-tab-panel" id="modalTabContent">
                        <div class="ck-upload-status" id="ckUploadStatus">
                            <i class="fa-solid fa-spinner"></i>
                            <span id="ckUploadStatusText">Đang upload ảnh...</span>
                        </div>
                        <div class="ck-wrap">
                            <textarea id="productContentEditor"></textarea>
                        </div>
                        <style>
                            .ck-wrap .ck-editor__editable img {
                                max-width: 100%;
                                height: auto;
                                border-radius: 6px;
                                display: block;
                                margin: 10px auto;
                            }

                            .ck-wrap .ck-editor__editable figure {
                                margin: 14px 0;
                                text-align: center;
                            }

                            .ck-wrap .ck-editor__editable figcaption {
                                font-size: 12px;
                                color: #8898aa;
                                font-style: italic;
                                margin-top: 4px;
                            }

                            .ck-wrap .ck-editor__editable table {
                                width: 100%;
                                border-collapse: collapse;
                                font-size: 13px;
                                margin: 14px 0;
                            }

                            .ck-wrap .ck-editor__editable table th {
                                background: #f6f9fc;
                                padding: 8px 12px;
                                font-weight: 700;
                                color: #32325d;
                                border: 1px solid #edf2f9;
                                text-align: left;
                            }

                            .ck-wrap .ck-editor__editable table td {
                                padding: 8px 12px;
                                border: 1px solid #edf2f9;
                                color: #525f7f;
                                vertical-align: top;
                            }

                            .ck-wrap .ck-editor__editable table tr:nth-child(even) td {
                                background: #f8f9fe;
                            }

                            .ck-wrap .ck-editor__editable blockquote {
                                border-left: 4px solid #5e72e4;
                                padding: 8px 14px;
                                background: #f0f3ff;
                                border-radius: 0 8px 8px 0;
                                margin: 12px 0;
                                color: #525f7f;
                                font-style: italic;
                            }

                            .ck-wrap .ck-editor__editable pre {
                                background: #f6f9fc;
                                border-radius: 8px;
                                padding: 12px;
                                overflow-x: auto;
                                font-size: 12px;
                                border: 1px solid #edf2f9;
                            }

                            .ck-wrap .ck-editor__editable code {
                                background: #eef0fd;
                                padding: 2px 5px;
                                border-radius: 4px;
                                font-size: 12px;
                                color: #5e72e4;
                            }
                        </style>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="m-btn m-btn-secondary" onclick="closeProductModal()">Hủy</button>
                    <button class="m-btn m-btn-primary" id="productSaveBtn" onclick="saveProduct()">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span id="productSaveLbl">Lưu sản phẩm</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ══════════════════════════════════════
     MODAL XÓA
══════════════════════════════════════ -->
        <div class="overlay" id="deleteOverlay" onclick="closeOnOverlay(event,'deleteOverlay')">
            <div class="modal-box modal-sm">
                <div class="modal-body" style="padding:32px 24px;">
                    <div class="delete-icon"><i class="fa-solid fa-trash"></i></div>
                    <div class="delete-confirm-text">
                        <strong>Xác nhận xóa?</strong>
                        <p style="margin-top:8px;" id="deleteName"></p>
                        <p style="color:#f5365c;font-size:12px;margin-top:8px;">Hành động này không thể hoàn tác!</p>
                    </div>
                </div>
                <div class="modal-footer" style="justify-content:center;">
                    <button class="m-btn m-btn-secondary" onclick="closeDeleteModal()">Hủy</button>
                    <button class="m-btn m-btn-danger" onclick="confirmDelete()">
                        <i class="fa-solid fa-trash"></i> Xóa
                    </button>
                </div>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>
    </div>
</body>

</html>
