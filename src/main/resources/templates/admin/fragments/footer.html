<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="footer">
    <style>
        .footer {
            padding: 20px 24px;
            border-top: 1px solid #edf2f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: #8898aa;
            background: #fff;
            margin-top: auto;
        }
        .footer a {
            color: #5e72e4;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover { text-decoration: underline; }
    </style>

    <footer class="footer">
        <span>&copy; 2026 <a href="#">Ocean Machine</a>. All rights reserved.</span>
        <span>Powered by <a href="#">Spring Boot + Thymeleaf</a></span>

</html>
