<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Ocean Machine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1f3c 0%, #2d3a6b 50%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(94,114,228,.2) 0%, transparent 70%);
            top: -200px; right: -200px;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(130,94,228,.15) 0%, transparent 70%);
            bottom: -100px; left: -100px;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #5e72e4, #825ee4);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-bottom: 12px;
            box-shadow: 0 10px 30px rgba(94,114,228,.4);
        }
        .login-brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .login-brand-sub {
            font-size: 12px;
            color: rgba(255,255,255,.5);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }

        .login-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #32325d;
            margin-bottom: 4px;
        }
        .login-card p {
            font-size: 13px;
            color: #8898aa;
            margin-bottom: 28px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-danger { background: #fff5f5; color: #f5365c; border: 1px solid #ffd6de; }
        .alert-success { background: #f0fff4; color: #2dce89; border: 1px solid #b2f5d8; }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #525f7f;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 11px 16px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: #32325d;
            background: #fff;
            transition: all .2s;
            outline: none;
        }
        .form-control:focus {
            border-color: #5e72e4;
            box-shadow: 0 0 0 3px rgba(94,114,228,.15);
        }
        .form-control::placeholder { color: #adb5bd; }

        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap .form-control {
            padding-left: 42px;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #5e72e4, #825ee4);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all .3s;
            box-shadow: 0 4px 15px rgba(94,114,228,.4);
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(94,114,228,.5);
        }
        .btn-login:active { transform: translateY(0); }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,.4);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-brand-icon">
                <i class="fa-solid fa-wave-square"></i>
            </div>
            <div class="login-brand-name">Ocean Machine</div>
            <div class="login-brand-sub">Admin Panel</div>
        </div>

        <div class="login-card">
            <h2>Chào mừng trở lại 👋</h2>
            <p>Đăng nhập để tiếp tục quản lý hệ thống</p>

            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation"></i>
                Sai tên đăng nhập hoặc mật khẩu
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fa-solid fa-circle-check"></i>
                Bạn đã đăng xuất thành công
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập</label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" name="username" class="form-control"
                               placeholder="Nhập username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" name="password" class="form-control"
                               placeholder="Nhập mật khẩu" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng nhập
                </button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 Ocean Machine. All rights reserved.
        </div>
    </div>

</body>
</html>
