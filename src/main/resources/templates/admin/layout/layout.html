<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Ocean Machine">Ocean Machine Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #5e72e4;
            --primary-dark: #4a5fd4;
            --success: #2dce89;
            --danger: #f5365c;
            --warning: #fb6340;
            --info: #11cdef;
            --bg: #f8f9fe;
            --text: #525f7f;
            --heading: #32325d;
            --border: #edf2f9;
            --card-shadow: 0 0 2rem 0 rgba(136,152,170,.15);
            --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container-fluid {
            padding: 0 24px 40px;
            margin-top: -80px;
            flex: 1;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

    <main class="main-content">
        <div th:replace="~{admin/fragments/navbar :: navbar}"></div>
        <div th:replace="~{admin/fragments/header :: header}"></div>

        <div class="container-fluid" layout:fragment="content"></div>

        <div th:replace="~{admin/fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/adminAssets/js/ckeditor.js}"></script>
 
    <th:block layout:fragment="scripts"></th:block>

</body>
</html>
